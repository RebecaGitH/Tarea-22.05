<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simuladores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-container">
    <h1>SIMULADORES</h1>

    <section>
        <h2>01. Transferencia de calor (Ley de Enfriamiento)</h2>
        <form id="formCalor" class="form-grid">
            <div class="input-box">
                <label for="to">Temp Inicial (T0)</label>
                <input type="number" id="to" required>
            </div>
            <div class="input-box">
                <label for="ts">Temp Ambiente (Ts)</label>
                <input type="number" id="ts" required>
            </div>
            <div class="input-box">
                <label for="k">Constante (k)</label>
                <input type="number" id="k" step="0.01" required>
            </div>
            <div class="input-box">
                <label for="t_calor">Tiempo (t/hrs)</label>
                <input type="number" id="t_calor" required>
            </div>
            <button type="button" onclick="handleCalor()">ejecutar cálculo de calor</button>
        </form>
        <div id="resCalor" class="result-zone">esperando parámetros...</div>
    </section>

    <section>
        <h2>02. Combinaciones complejas (caso de Sorteo)</h2>
        <form id="formCombo" class="form-grid">
            <div class="input-box">
                <label for="n1">G1: n (total)</label>
                <input type="number" id="n1" required>
            </div>
            <div class="input-box">
                <label for="r1">G1: r (selección)</label>
                <input type="number" id="r1" required>
            </div>
            <div class="input-box">
                <label for="n2">G2: n (total)</label>
                <input type="number" id="n2" required>
            </div>
            <div class="input-box">
                <label for="r2">G2: r (selección)</label>
                <input type="number" id="r2" required>
            </div>
            <button type="button" onclick="handleSorteo()">procesar combinaciones</button>
        </form>
        <div id="resCombo" class="result-zone">esperando datos de entrada...</div>
    </section>
    <span class="watermark">Rebeca Rojas</span>
</div>

<script src="script.js"></script>
</body>
</html>
